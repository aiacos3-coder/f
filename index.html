<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Flores 🌹🌼</title>
<style>
    body {
        margin: 0;
        background: black;
        overflow: hidden;
    }
    canvas {
        display: block;
    }
</style>
</head>
<body>
<canvas id="c"></canvas>

<script>
const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let angle = 0;
let time = 0;

// 🌹 Dibujar rosa
function rose(x, y, size, color) {
    ctx.fillStyle = color;
    ctx.beginPath();

    for (let i = 0; i < 360; i += 5) {
        let rad = i * Math.PI / 180;
        let r = size * Math.sin(3 * rad);
        let px = x + r * Math.cos(rad);
        let py = y + r * Math.sin(rad);
        ctx.lineTo(px, py);
    }

    ctx.fill();
}

// 🌼 Flor amarilla
function sunflower(x, y, size) {
    ctx.fillStyle = "yellow";

    for (let i = 0; i < 12; i++) {
        let ang = i * Math.PI / 6;
        ctx.beginPath();
        ctx.ellipse(
            x + Math.cos(ang) * size,
            y + Math.sin(ang) * size,
            size / 2,
            size,
            ang,
            0,
            Math.PI * 2
        );
        ctx.fill();
    }

    // centro
    ctx.fillStyle = "gold";
    ctx.beginPath();
    ctx.arc(x, y, size / 2, 0, Math.PI * 2);
    ctx.fill();
}

// posiciones
let flowers = [
    {x:-200,y:100,type:"rose",color:"red"},
    {x:200,y:100,type:"rose",color:"red"},
    {x:0,y:-200,type:"rose",color:"pink"},
    {x:-150,y:-50,type:"rose",color:"red"},
    {x:150,y:-50,type:"rose",color:"red"},
    {x:0,y:200,type:"sun"}
];

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    ctx.save();
    ctx.translate(canvas.width/2, canvas.height/2);
    ctx.rotate(angle);

    flowers.forEach((f, i) => {
        if (i < time) {
            if (f.type === "rose") {
                rose(f.x, f.y, 40, f.color);
            } else {
                sunflower(f.x, f.y, 30);
            }
        }
    });

    ctx.restore();

    angle += 0.01;

    if (time < flowers.length) {
        time += 0.02;
    }

    requestAnimationFrame(draw);
}

draw();
</script>
</body>
</html>
